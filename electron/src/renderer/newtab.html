<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab — Prodigy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
</head>

<body>

  <!-- Dynamic Brain/Neural Network Canvas -->
  <canvas id="nt-canvas"></canvas>

  <!-- Main Content -->
  <div id="newtab-root">

    <!-- Top-right Settings Gear -->
    <button id="nt-settings-btn" title="New Tab Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
        <path
          d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
      </svg>
    </button>

    <!-- Settings Popup Card -->
    <div id="nt-settings-popup" class="hidden">
      <div class="popup-title">New Tab Settings</div>
      <div class="popup-section">
        <label class="popup-label">Background Mode</label>
        <div class="vis-options">
          <button id="vis-btn-brain" class="vis-btn active" data-mode="brain">Neural Brain</button>
          <button id="vis-btn-earth" class="vis-btn" data-mode="earth">Planet Earth</button>
          <button id="vis-btn-none" class="vis-btn" data-mode="none">None</button>
        </div>
      </div>
      <div class="popup-section">
        <label class="popup-label">UI Color Theme</label>
        <div class="theme-options">
          <button class="theme-dot-btn dark active" data-theme="dark" title="Default Dark"></button>
          <button class="theme-dot-btn cyberpunk" data-theme="cyberpunk" title="Cyberpunk"></button>
          <button class="theme-dot-btn forest" data-theme="forest" title="Forest"></button>
          <button class="theme-dot-btn sunset" data-theme="sunset" title="Sunset"></button>
          <button class="theme-dot-btn light" data-theme="light" title="Light"></button>
          <button class="theme-dot-btn monochrome" data-theme="monochrome" title="Monochrome"></button>
          <button class="theme-dot-btn sakura" data-theme="sakura" title="Sakura"></button>
          <button class="theme-dot-btn fire" data-theme="fire" title="Fire"></button>
        </div>
      </div>
    </div>

    <!-- Hero -->
    <section id="nt-hero">

      <div id="nt-top-group">
        <!-- Logo + Branding -->
        <div id="nt-brand">
          <div id="nt-logo-wrap">
            <img id="nt-logo" src="prodigy_nbg.png" alt="Prodigy Logo" draggable="false">
            <div id="nt-logo-glow"></div>
          </div>
          <div id="nt-brand-text">
            <h1 id="nt-title">Prodigyreview</h1>
            <p id="nt-subtitle">Secure Exam Browser</p>
          </div>
        </div>

        <!-- Live Clock -->
        <div id="nt-clock-block">
          <div id="nt-clock">00:00</div>
          <div id="nt-date">Monday, January 1</div>
        </div>

        <!-- Motivational Quote -->
        <p id="nt-quote"></p>
      </div>

      <!-- Search Bar -->
      <div id="nt-search-wrap">
        <div id="nt-search-box">
          <!-- Google "G" icon -->
          <svg id="nt-google-icon" viewBox="0 0 48 48" width="22" height="22">
            <path fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
            <path fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
            <path fill="#FBBC05"
              d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
            <path fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
            <path fill="none" d="M0 0h48v48H0z" />
          </svg>
          <input id="nt-search-input" type="text" placeholder="Search the web…" autocomplete="off" spellcheck="false"
            autofocus>
          <button id="nt-search-btn" aria-label="Search">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path
                d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
          </button>
        </div>
        <p id="nt-search-hint">Powered by Google · Press <kbd>Enter</kbd> to search</p>
      </div>

      <!-- Spacer to balance the top group and keep search bar centered -->
      <div class="nt-hero-spacer"></div>

    </section>

    <!-- Stats Bar (SEB Security Info) -->
    <footer id="nt-footer">
      <div class="nt-stat">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" class="nt-stat-icon shield-icon">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" />
        </svg>
        <span id="nt-stat-shield">AI Blocking Active</span>
      </div>
      <div class="nt-stat-divider"></div>
      <div class="nt-stat">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" class="nt-stat-icon">
          <path
            d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
        </svg>
        <span>Secure Session</span>
      </div>
      <div class="nt-stat-divider"></div>
      <div class="nt-stat">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" class="nt-stat-icon">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" />
        </svg>
        <span id="nt-stat-session">Session Running</span>
      </div>
    </footer>

  </div>

  <script src="newtab.js"></script>
</body>

</html>
