<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prodigy Browser</title>
  <link rel="stylesheet" href="browser.css">
  <script src="browser.js" defer></script>
</head>
<body>
  <div id="browser-container">
    <!-- Top Chrome Area -->
    <header id="browser-header">
      <!-- Tabs Bar -->
      <div id="tabs-bar">
        <div id="tabs-container">
          <!-- Dynamic tabs will be injected here -->
        </div>
        <button id="new-tab-btn" title="New Tab (Ctrl+T)">+</button>
      </div>

      <!-- Control Bar -->
      <div id="control-bar">
        <div id="nav-buttons">
          <button id="nav-back-btn" class="nav-btn" title="Back" disabled>
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </button>
          <button id="nav-forward-btn" class="nav-btn" title="Forward" disabled>
            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
          </button>
          <button id="nav-refresh-btn" class="nav-btn" title="Refresh">
            <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          </button>
          <button id="nav-home-btn" class="nav-btn" title="Go to Exam Home">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          </button>
        </div>

        <!-- URL Input -->
        <div id="address-container">
          <div id="security-icon" class="secure" title="Secure Connection">
            <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          </div>
          <input type="text" id="address-input" placeholder="Search or enter web address" autocomplete="off" spellcheck="false">
          <div id="loading-spinner" class="hidden"></div>
          
          <!-- Address Bar Zoom Button -->
          <button id="address-zoom-btn" class="address-zoom-btn hidden" title="Zoom">
            <svg viewBox="0 0 24 24" class="zoom-icon-svg"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span id="address-zoom-text">100%</span>
          </button>
        </div>

        <!-- Actions -->
        <div id="chrome-actions">
          <span id="ai-shield-badge" class="badge" title="AI Blocking Shield Active">
            <span class="shield-icon">🛡️</span> AI Blocked
          </span>
          <button id="chrome-exit-btn" class="exit-btn">Exit Session</button>
          <button id="chrome-menu-btn" class="menu-btn" title="Main Menu">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Hamburger Dropdown Menu -->
    <div id="menu-dropdown" class="menu-dropdown hidden">
      <div class="menu-item" id="menu-item-new-tab">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="menu-svg-icon"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span class="menu-item-text">New Tab</span>
        <span class="menu-item-shortcut">Ctrl+T</span>
      </div>
      <div class="menu-item" id="menu-item-reload">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="menu-svg-icon"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        <span class="menu-item-text">Reload Tab</span>
        <span class="menu-item-shortcut">Ctrl+R</span>
      </div>
      <div class="menu-item" id="menu-item-downloads">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="menu-svg-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        <span class="menu-item-text">Downloads</span>
        <span class="menu-item-shortcut">Ctrl+J</span>
      </div>
      <div class="menu-item" id="menu-item-magnifier">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="menu-svg-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <span class="menu-item-text">Magnifier</span>
        <span class="menu-item-shortcut">Ctrl+M</span>
      </div>
      
      <div class="menu-divider"></div>
      
      <!-- Zoom Controls Row -->
      <div class="menu-zoom-row">
        <span class="menu-zoom-label">Zoom</span>
        <button class="menu-zoom-btn-action" id="menu-zoom-out">−</button>
        <span class="menu-zoom-value" id="menu-zoom-percentage">100%</span>
        <button class="menu-zoom-btn-action" id="menu-zoom-in">+</button>
        <button class="menu-zoom-btn-action" id="menu-zoom-fullscreen" title="Toggle Fullscreen">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
          </svg>
        </button>
      </div>
      
      <div class="menu-divider"></div>
      
      <div class="menu-item status-item" id="menu-item-shield">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="menu-svg-icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <span class="menu-item-text">AI Shield Status</span>
        <span class="menu-item-shortcut status-active">Active</span>
      </div>
      <div class="menu-item danger-item" id="menu-item-exit">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="menu-svg-icon"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        <span class="menu-item-text">Exit Session</span>
        <span class="menu-item-shortcut">Ctrl+Q</span>
      </div>
    </div>

    <!-- Webviews Content Container -->
    <main id="webview-views">
      <!-- Webview tags will be dynamically generated here -->
    </main>
  </div>

  <!-- Exit Verification Dialog Modal -->
  <div id="exit-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>Exit Exam Session</h3>
      <p>Are you sure you want to exit the exam session? Unsaved changes may be lost.</p>
      <div class="modal-buttons">
        <button id="exit-cancel-btn" class="modal-btn cancel">Cancel</button>
        <button id="exit-submit-btn" class="modal-btn submit">Exit Session</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <!-- Tab Context Menu -->
  <div id="tab-context-menu" class="tab-context-menu hidden">
    <div class="context-menu-item" id="menu-reload">Reload Tab</div>
    <div class="context-menu-separator"></div>
    <div class="context-menu-item" id="menu-close">Close Tab</div>
    <div class="context-menu-item" id="menu-close-others">Close Other Tabs</div>
  </div>

  <!-- Zoom Popover Bubble -->
  <div id="zoom-popover" class="zoom-popover hidden">
    <button id="popover-zoom-out" class="popover-btn" title="Zoom Out">−</button>
    <span id="popover-zoom-val">100%</span>
    <button id="popover-zoom-in" class="popover-btn" title="Zoom In">+</button>
    <div class="popover-separator"></div>
    <button id="popover-zoom-reset" class="popover-reset-btn">Reset</button>
  </div>

  <!-- Windows Magnifier Lens Overlay -->
  <div id="magnifier-lens" class="hidden">
    <div id="magnifier-lens-badge">2.0x</div>
  </div>
</body>
</html>
