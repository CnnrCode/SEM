<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prodigy — Starting</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070913;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    .splash {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
    }

    /* Subtle radial glow behind logo */
    .splash::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      width: 320px;
      height: 320px;
      background: radial-gradient(ellipse at center, rgba(79, 142, 247, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      display: block;
    }

    .brand {
      text-align: center;
      margin-bottom: 48px;
    }

    .brand-name {
      font-size: 2rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .brand-sub {
      font-size: 0.72rem;
      font-weight: 500;
      color: #475569;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* Progress bar track */
    .progress-track {
      width: 200px;
      height: 2px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }

    /* Indeterminate shimmer */
    .progress-fill {
      position: absolute;
      top: 0;
      left: -60%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #4f8ef7, transparent);
      border-radius: 99px;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% {
        left: -60%;
      }

      100% {
        left: 110%;
      }
    }

    .status {
      margin-top: 14px;
      font-size: 0.72rem;
      color: #334155;
      letter-spacing: 0.04em;
    }

    /* Version badge bottom */
    .version {
      position: absolute;
      bottom: 20px;
      font-size: 0.65rem;
      color: #1e293b;
      letter-spacing: 0.05em;
    }
  </style>
</head>

<body>
  <div class="splash">
    <div class="logo-wrap">
      <img class="logo" src="prodigy_nbg.png" alt="Prodigy Logo" draggable="false">
    </div>
    <div class="brand">
      <div class="brand-name">Prodigy</div>
      <div class="brand-sub">Symphonics Co.</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <div class="status">Initializing secure session...</div>
    <div class="version" id="version-label">v1.0.0</div>
  </div>

  <script>
    // Show app version if exposed
    try {
      if (window.splashApi && window.splashApi.getVersion) {
        window.splashApi.getVersion().then(v => {
          document.getElementById('version-label').textContent = `v${v}`;
        });
      }
    } catch (e) { }
  </script>
</body>

</html>
