<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure PDF Viewer</title>
  <link rel="stylesheet" href="pdfviewer.css">
  <!-- Load PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>
  <div id="viewer-container">
    <!-- Top Toolbar -->
    <header id="viewer-toolbar">
      <div class="toolbar-left">
        <svg class="pdf-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <span id="document-title">Loading PDF...</span>
      </div>

      <div class="toolbar-center">
        <!-- Page Controls -->
        <button id="prev-btn" class="nav-btn" title="Previous Page" disabled>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <span class="page-indicator">
          Page <span id="page-num">0</span> of <span id="page-count">0</span>
        </span>
        <button id="next-btn" class="nav-btn" title="Next Page" disabled>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>

        <div class="toolbar-divider"></div>

        <!-- Zoom Controls -->
        <button id="zoom-out-btn" class="nav-btn" title="Zoom Out">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <span id="zoom-value" class="zoom-value">100%</span>
        <button id="zoom-in-btn" class="nav-btn" title="Zoom In">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button id="zoom-reset-btn" class="text-btn">Reset</button>
      </div>

      <div class="toolbar-right">
        <!-- Close Button -->
        <button id="close-btn" class="close-btn" title="Close Viewer">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </header>

    <!-- Canvas Container -->
    <main id="pdf-view-viewport">
      <div id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
      </div>
      <div id="loading-spinner" class="spinner"></div>
      <div id="error-message" class="error-container hidden">
        <p>Failed to load PDF document. Please check the file path or URL.</p>
      </div>
    </main>
  </div>

  <script src="pdfviewer.js"></script>
</body>
</html>
