<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Environment Security Alert</title>
  <style>
    body {
      background-color: #070913;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .card {
      background-color: #0d1127;
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }
    .icon {
      color: #ef4444;
      font-size: 64px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🖥️🚫</div>
    <h1>Virtual Machine Detected</h1>
    <p>SecureExam Browser cannot run inside virtual environments to protect exam integrity. Please close this window and launch the application natively on your host machine.</p>
  </div>
</body>
</html>
