[[headers]]
  for = "/*.exe"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Disposition = "attachment"
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.zip"
  [headers.values]
    Content-Type = "application/zip"
    Content-Disposition = "attachment"
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
